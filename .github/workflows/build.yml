name: Build & Publish

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "src/**"
      - "python/**"
      - "!python/pymesh/tests/**"
      - "tools/**"
      - "third_party/**"
      - "setup.py"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "src/**"
      - "python/**"
      - "!python/pymesh/tests/**"
      - "tools/**"
      - "third_party/**"
      - "setup.py"
      - "CMakeLists.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Single approval gate ─────────────────────────────────────────
  approve:
    name: Approve build
    runs-on: ubuntu-latest
    environment: build
    steps:
      - run: echo "Build approved"

  # ── Build wheels (12 parallel workers) ───────────────────────────
  build_wheels:
    name: "${{ matrix.os }} cp${{ matrix.python }}"
    needs: approve
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14, windows-2022]
        python: ["310", "311", "312", "313"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Windows: install vcpkg deps
      - name: Restore vcpkg cache
        if: runner.os == 'Windows'
        id: vcpkg-cache
        uses: actions/cache/restore@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-v2
          restore-keys: vcpkg-windows-

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: |
          vcpkg install cgal:x64-windows boost-thread:x64-windows boost-system:x64-windows eigen3:x64-windows gmp:x64-windows mpfr:x64-windows tbb:x64-windows openblas:x64-windows
        shell: cmd

      - name: Save vcpkg cache
        if: runner.os == 'Windows' && steps.vcpkg-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-v2

      # Cache third-party build output
      - name: Cache third-party libraries
        uses: actions/cache@v4
        with:
          path: python/pymesh/third_party
          key: third-party-v3-${{ runner.os }}-${{ hashFiles('third_party/build.py', 'third_party/**/CMakeLists.txt') }}
          restore-keys: |
            third-party-v3-${{ runner.os }}-

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: "cp${{ matrix.python }}-*"
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux* pp*"
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build[uv]"

          # Linux: install system deps + build third-party
          CIBW_BEFORE_ALL_LINUX: |
            yum install -y epel-release || true
            yum install -y cmake3 ninja-build boost-devel gmp-devel mpfr-devel swig openblas-devel || \
            (apt-get update && apt-get install -y cmake ninja-build libboost-all-dev libgmp-dev libmpfr-dev swig libopenblas-dev)

            # nlohmann_json from source
            cd /tmp && curl -L https://github.com/nlohmann/json/archive/refs/tags/v3.11.3.tar.gz -o json.tar.gz
            tar xf json.tar.gz && cd json-3.11.3 && mkdir build && cd build
            cmake .. -GNinja -DJSON_BuildTests=OFF && ninja install

            # CGAL from source if not available
            if ! pkg-config --exists cgal 2>/dev/null; then
              cd /tmp && curl -L https://github.com/CGAL/cgal/releases/download/v5.6/CGAL-5.6.tar.xz -o cgal.tar.xz
              tar xf cgal.tar.xz && cd CGAL-5.6 && mkdir build && cd build
              cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release && ninja -j$(nproc) && ninja install
            fi

            cd {package}/third_party && python3 build.py all

          # macOS: install system deps + build third-party
          CIBW_BEFORE_ALL_MACOS: |
            brew install cmake ninja boost gmp mpfr swig openblas nlohmann-json tbb
            cd {package}/third_party && python3 build.py all

          # Windows: third_party built via setup.py, vcpkg provides system deps
          CIBW_BEFORE_ALL_WINDOWS: "echo Windows build - vcpkg deps already installed"

          CIBW_ENVIRONMENT: "PYMESH_PATH={package} CFLAGS=-fcommon CXXFLAGS=-fcommon"
          CIBW_ENVIRONMENT_MACOS: "PYMESH_PATH={package} CFLAGS=-fcommon CXXFLAGS=-fcommon MACOSX_DEPLOYMENT_TARGET=11.0 DYLD_LIBRARY_PATH={package}/python/pymesh/third_party/lib"
          CIBW_ENVIRONMENT_WINDOWS: "PYMESH_PATH={package} CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake CFLAGS=-fcommon CXXFLAGS=-fcommon"

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "DYLD_LIBRARY_PATH=$PYMESH_PATH/python/pymesh/third_party/lib delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"

          CIBW_TEST_REQUIRES: numpy pytest
          CIBW_TEST_COMMAND: >-
            python -c "import pymesh; import numpy as np;
            v=np.array([[0,0,0],[1,0,0],[0,1,0],[0,0,1]],dtype=float);
            f=np.array([[0,1,2],[0,2,3]],dtype=np.int32);
            m=pymesh.form_mesh(v,f);
            print(f'PyMesh {pymesh.__version__}: {m.num_vertices}v {m.num_faces}f')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-cp${{ matrix.python }}
          path: ./wheelhouse/*.whl

  # ── Source distribution ──────────────────────────────────────────
  build_sdist:
    name: Source distribution
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install setuptools wheel && python setup.py sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Tests & demo renders ─────────────────────────────────────────
  test:
    name: Test & render (ubuntu cp312)
    needs: build_wheels
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-24.04-cp312
          path: wheelhouse

      - name: Install and test
        run: |
          pip install wheelhouse/*.whl
          pip install pytest numpy scipy
          # Copy tests to /tmp so local source tree doesn't shadow installed wheel
          cp -r python/pymesh/tests /tmp/pymesh_tests
          cd /tmp && python -m pytest pymesh_tests/ -v --tb=short

      - name: Generate demo renders
        working-directory: ${{ github.workspace }}
        run: |
          pip install pyvista vtk Pillow
          sudo apt-get update && sudo apt-get install -y xvfb libgl1-mesa-dev
          xvfb-run -a python docs/generate_demo.py

      - uses: actions/upload-artifact@v4
        with:
          name: demo-site
          path: docs/_site

  # ── Release (only after tests pass) ─────────────────────────────
  release:
    name: Upload to GitHub Releases
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [test, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from version.py
        id: version
        run: echo "version=$(python3 -c "exec(open('python/pymesh/version.py').read()); print(__version__)")" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect wheels and sdist
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          find artifacts -name "*.tar.gz" -exec cp {} dist/ \;
          echo "Collected:"
          ls -la dist/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/*
          generate_release_notes: true

  # ── PyPI (only on tag, after tests) ─────────────────────────────
  publish_pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect dist
        run: |
          mkdir -p dist
          find artifacts -name "*.whl" -exec cp {} dist/ \;
          find artifacts -name "*.tar.gz" -exec cp {} dist/ \;

      - uses: pypa/gh-action-pypi-publish@release/v1
